<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algebra 2 — Redirecting</title>
  <script>
    // GitHub Pages SPA redirect — preserve hash for hash-based routing
    var base = window.location.pathname.split('/').slice(0, 2).join('/');
    window.location.replace(base + '/' + window.location.hash);
  </script>
</head>
<body>
  <p style="font-family:sans-serif;padding:40px;text-align:center;color:#94a3b8">
    Redirecting… <a href="/" style="color:#7c3aed">Return to home</a>
  </p>
</body>
</html>
